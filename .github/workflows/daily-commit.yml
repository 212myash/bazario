name: Daily Commit

on:
  schedule:
    - cron: "30 18 * * *"
  workflow_dispatch:

jobs:
  auto-commit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - run: echo "Update $(date)" >> daily-log.txt

      - run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Daily auto commit" || echo "No changes"
          git push
