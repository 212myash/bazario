name: Daily Commit

permissions:
  contents: write

on:
  schedule:
    - cron: "30 18 * * *"
  workflow_dispatch:

jobs:
  auto-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Make daily change
        run: echo "Update $(date)" >> daily-log.txt

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "Daily auto commit" || echo "No changes"
          git push
