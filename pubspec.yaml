name: bazario
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  dio: ^5.8.0+1
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^9.2.4
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  intl: ^0.20.2
  google_fonts: ^6.2.1
  razorpay_flutter: ^1.4.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  integration_test:
    sdk: flutter
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path_android: assets/images/Lighticon.png
  image_path_ios: assets/images/Lighticon.png
  adaptive_icon_foreground: assets/images/Lighticon.png
  adaptive_icon_background: "#FFFFFF"
  remove_alpha_ios: true
